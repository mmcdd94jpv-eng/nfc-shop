function showQR(type){
  const config = QR_CONFIG[type];
  document.getElementById("qrTitle").innerText = config.title;
  document.getElementById("qrImage").src = config.image;
  document.getElementById("qrText").innerText = config.text;
  document.getElementById("qrModal").style.display = "block";
}

function closeQR(){
  document.getElementById("qrModal").style.display = "none";
}

function openWechat(){
  window.location.href = "weixin://";
}

function generateReview(keyword){
  const arr = reviews[keyword];
  const text = arr[Math.floor(Math.random() * arr.length)];
  document.getElementById("reviewResult").textContent = text;
  copyText(text);
}

function copyReview(){
  const text = document.getElementById("reviewResult").innerText;
  copyText(text);
}

function copyText(text){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>{
      showToast("评价已复制");
    });
  }else{
    fallbackCopy(text);
  }
}

function fallbackCopy(text){
  const textarea = document.createElement("textarea");
  textarea.value = text;
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand("copy");
  document.body.removeChild(textarea);
  showToast("评价已复制");
}

function showToast(message){
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.innerText = message;
  document.body.appendChild(toast);
  setTimeout(()=>{toast.remove();},1800);
}

window.onclick = function(event){
  const modal = document.getElementById("qrModal");
  if(event.target === modal){
    closeQR();
  }
};
