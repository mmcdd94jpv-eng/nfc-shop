<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NFC 商家服务中心</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f6f8;font-family:Arial,"Microsoft YaHei";color:#222;}
.container{max-width:430px;margin:auto;padding:20px;}
.card{background:#fff;border-radius:24px;padding:26px;box-shadow:0 10px 35px rgba(0,0,0,0.08);}
.logo{width:90px;height:90px;background:#111;color:#fff;border-radius:50%;line-height:90px;text-align:center;margin:auto;font-size:32px;font-weight:bold;}
h1{text-align:center;margin-top:18px;font-size:28px;}
.desc{text-align:center;margin-top:10px;margin-bottom:24px;color:#666;font-size:14px;}
.review-box{background:#f8f8f8;border-radius:18px;padding:18px;margin-bottom:22px;}
.review-title{font-size:18px;font-weight:bold;margin-bottom:10px;}
.review-tip{color:#777;font-size:13px;margin-bottom:16px;line-height:1.6;}
.keywords{display:flex;flex-wrap:wrap;gap:10px;}
.tag{background:#fff;border:1px solid #ddd;border-radius:30px;padding:10px 14px;cursor:pointer;font-size:14px;}
.tag:hover{background:#111;color:#fff;}
.review-result{margin-top:18px;background:#fff;border-radius:14px;padding:16px;min-height:220px;border:1px solid #eee;line-height:1.9;font-size:15px;color:#333;white-space:pre-wrap;}
.copy-btn{width:100%;padding:15px;border:none;background:#111;color:#fff;border-radius:14px;margin-top:15px;font-size:16px;cursor:pointer;}
.btn{display:block;width:100%;text-align:center;color:#fff;padding:16px;border-radius:14px;margin-top:14px;font-size:17px;font-weight:bold;border:none;cursor:pointer;}
.ctrip{background:#007aff;}
.meituan{background:#ffcc00;color:#111;}
.wechat{background:#07c160;}
.openwx{background:#1aad19;}
.footer{text-align:center;margin-top:24px;color:#999;font-size:12px;}
.modal{display:none;position:fixed;z-index:999;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.55);}
.modal-content{background:#fff;width:88%;max-width:360px;margin:80px auto;padding:22px;border-radius:18px;text-align:center;position:relative;}
.close{position:absolute;right:18px;top:10px;font-size:30px;cursor:pointer;}
.qr-img{width:100%;max-width:280px;margin:18px auto;display:block;border-radius:12px;}
.modal-tip{font-size:14px;color:#666;line-height:1.7;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.82);color:#fff;padding:12px 18px;border-radius:30px;font-size:14px;z-index:9999;}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="logo">店</div>
<h1>商家服务中心</h1>
<div class="desc">欢迎光临 · 感谢您的支持 ❤️</div>

<div class="review-box">
<div class="review-title">⭐ AI随机评价</div>
<div class="review-tip">点击关键词自动生成随机长评价，并自动复制</div>

<div class="keywords">
<div class="tag" onclick="generateReview('服务很好')">服务很好</div>
<div class="tag" onclick="generateReview('环境不错')">环境不错</div>
<div class="tag" onclick="generateReview('性价比高')">性价比高</div>
<div class="tag" onclick="generateReview('非常推荐')">非常推荐</div>
<div class="tag" onclick="generateReview('干净卫生')">干净卫生</div>
<div class="tag" onclick="generateReview('前台热情')">前台热情</div>
<div class="tag" onclick="generateReview('体验很好')">体验很好</div>
<div class="tag" onclick="generateReview('交通方便')">交通方便</div>
<div class="tag" onclick="generateReview('朋友聚会')">朋友聚会</div>
</div>

<div class="review-result" id="reviewResult">点击关键词生成随机长评价...</div>

<button class="copy-btn" onclick="copyReview()">一键复制评价</button>
</div>

<button class="btn ctrip" onclick="showQR('ctrip')">✈️ 携程订酒店</button>
<button class="btn meituan" onclick="showQR('meituan')">🟡 美团订酒店</button>
<button class="btn wechat" onclick="showQR('wechat')">📱 添加前台微信</button>
<button class="btn openwx" onclick="openWechat()">💬 打开微信</button>

<div class="footer">NFC 碰一碰智慧营销系统</div>

</div>
</div>

<div id="qrModal" class="modal">
<div class="modal-content">

<span class="close" onclick="closeQR()">×</span>

<h3 id="qrTitle">扫码识别</h3>

<img id="qrImage" src="wechat-qr.png" class="qr-img" alt="二维码">

<p id="qrText" class="modal-tip">长按识别二维码</p>

</div>
</div>

<script>
const QR_CONFIG = {
  ctrip: {
    title: "携程订房码",
    image: "ctrip-qr.jpg",
    text: "请长按二维码图片，选择“识别图中二维码”进入携程订房"
  },
  meituan: {
    title: "美团订房码",
    image: "meituan-qr.jpg",
    text: "请长按二维码图片，选择“识别图中二维码”进入美团订房"
  },
  wechat: {
    title: "添加前台微信",
    image: "wechat-qr.png",
    text: "请长按二维码图片，选择“识别图中二维码”添加前台微信"
  }
};

const recentReviews = [];

const reviewParts = {
  "服务很好": ["服务态度特别好", "工作人员很热情", "接待过程很专业", "沟通起来很舒服", "服务细节很到位"],
  "环境不错": ["环境干净舒服", "装修风格很好看", "整体氛围很放松", "空间很整洁", "卫生做得很到位"],
  "性价比高": ["价格很合理", "整体体验很值", "服务和环境都对得起价格", "消费体验很满意", "下次还会再来"],
  "非常推荐": ["整体体验非常满意", "很值得推荐", "朋友也觉得不错", "体验感超出预期", "以后还会再来"],
  "干净卫生": ["卫生细节很好", "环境非常干净", "整体让人很安心", "用品看起来很整洁", "体验过程很放心"],
  "前台热情": ["前台接待很热情", "工作人员很有耐心", "服务态度很好", "沟通很顺畅", "接待体验很舒服"],
  "体验很好": ["整个过程很舒服", "体验感非常不错", "流程安排很顺畅", "整体感觉很放松", "服务环境都很好"],
  "交通方便": ["位置很好找", "交通特别方便", "停车也比较方便", "过来很轻松", "周边位置很明显"],
  "朋友聚会": ["很适合朋友聚会", "氛围感很好", "大家都挺满意", "聊天放松很合适", "下次还会一起过来"],
  "情侣约会": ["很适合情侣约会", "氛围比较舒服", "环境很有感觉", "两个人体验很放松", "整体感觉很温馨"]
};

const starts = [
  "第一次过来体验，整体感觉比预想中更好。",
  "今天和朋友一起过来，整体体验还是挺满意的。",
  "之前看评价觉得不错，这次过来确实没有失望。",
  "整体来说这次体验很舒服，很多地方都比较到位。",
  "这次过来感觉挺惊喜的，整体体验感很不错。",
  "朋友之前推荐过这里，实际体验下来确实可以。",
  "本来只是顺路过来试试，没想到整体感觉挺好。",
  "这次体验下来印象比较深，整体服务和环境都不错。",
  "整体感觉挺舒服的，进来以后氛围就比较放松。",
  "今天体验完以后感觉挺满意，很多细节都不错。"
];

const details = [
  "整个过程没有明显等待，安排也比较顺畅。",
  "细节方面处理得比较认真，让人感觉比较放心。",
  "工作人员沟通起来比较自然，没有让人有压力。",
  "整体氛围比较轻松，很适合过来放松一下。",
  "体验过程中感觉比较舒服，节奏也刚刚好。",
  "环境和服务都比较稳定，没有让人失望。",
  "很多小细节能看出来店里还是挺用心的。",
  "整体感觉比较自然，体验完成以后满意度挺高。",
  "不管是环境还是服务，都能看出来有认真打理。",
  "这次整体体验比较顺心，感觉比预期更好一些。"
];

const ends = [
  "下次有机会还会再来，也会推荐朋友过来体验。",
  "整体来说挺值得的，之后还会考虑再来。",
  "不管是服务还是环境都比较满意，推荐大家试试。",
  "这次体验比较舒服，整体满意度还是挺高的。",
  "价格和体验匹配度不错，整体感觉比较划算。",
  "如果附近有朋友需要，我也会愿意推荐这里。",
  "整体没有踩雷，体验感比预期更好一些。",
  "这次体验让我印象不错，下次还会继续选择这里。",
  "整体感觉比较满意，适合朋友或者家人一起过来。",
  "以后有机会还会再来，整体体验值得肯定。"
];

function randomItem(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function showQR(type){
  const config = QR_CONFIG[type];
  document.getElementById("qrTitle").innerText = config.title;
  document.getElementById("qrImage").src = config.image;
  document.getElementById("qrText").innerText = config.text;
  document.getElementById("qrModal").style.display = "block";
}

function closeQR(){
  document.getElementById("qrModal").style.display = "none";
}

function openWechat(){
  window.location.href = "weixin://";
}

function generateReview(keyword){

  let text = "";

  for(let i = 0; i < 30; i++){

    const words = reviewData[keyword];

    text =
      randomItem(starts) +
      randomItem(words) + "，" +
      randomItem(words) + "，" +
      randomItem(details) +
      randomItem(ends);

    if(!recentReviews.includes(text)){
      break;
    }
  }

  recentReviews.push(text);

  if(recentReviews.length > 50){
    recentReviews.shift();
  }

  document.getElementById("reviewResult").textContent = text;

  copyText(text);
}

function copyReview(){
  const text = document.getElementById("reviewResult").innerText;
  copyText(text);
}

function copyText(text){
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>{
      showToast("评价已复制");
    });
  }else{
    fallbackCopy(text);
  }
}

function fallbackCopy(text){
  const textarea = document.createElement("textarea");
  textarea.value = text;
  document.body.appendChild(textarea);
  textarea.select();
  document.execCommand("copy");
  document.body.removeChild(textarea);
  showToast("评价已复制");
}

function showToast(message){
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.innerText = message;
  document.body.appendChild(toast);
  setTimeout(()=>{toast.remove();},1800);
}

window.onclick = function(event){
  const modal = document.getElementById("qrModal");
  if(event.target === modal){
    closeQR();
  }
};
</script>

</body>
</html>
